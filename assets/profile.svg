<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Profile placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2140"/>
      <stop offset="100%" stop-color="#0f1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="60%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bg)"/>
  <rect width="400" height="400" fill="url(#glow)"/>

  <circle cx="200" cy="200" r="150" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.2"/>

  <text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle"
        font-family="Space Grotesk, Inter, sans-serif" font-size="150" font-weight="800"
        fill="url(#accent)" letter-spacing="-6">RK</text>

  <text x="50%" y="78%" text-anchor="middle"
        font-family="JetBrains Mono, monospace" font-size="13" fill="#b5bdd0" letter-spacing="3">
    RESEARCHER \u00b7 IIT ROPAR
  </text>
</svg>
